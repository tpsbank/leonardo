<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TPS BANK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --card-color: #1e2748;
            --accent: #00f2ff;
            --text-dim: #666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* NUOVA SEZIONE LOGO PERSONALIZZATO */
        .brand-header {
            padding: 40px 20px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .custom-logo {
            max-width: 180px; /* Regola la larghezza massima del tuo logo */
            height: auto;     /* Mantiene le proporzioni */
            max-height: 80px; /* Regola l'altezza massima */
            object-fit: contain;
        }

        /* SALDO */
        .balance-section {
            padding: 20px;
            text-align: center;
        }
        .label { color: var(--text-dim); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .balance { font-size: 46px; font-weight: 700; margin-top: 5px; }

        /* CONTENT AREA */
        .main { flex: 1; padding: 0 25px; display: flex; flex-direction: column; align-items: center; }

        /* TESSERA BLUE #1e2748 */
        .card {
            width: 100%;
            max-width: 340px;
            aspect-ratio: 1.58 / 1;
            background-color: var(--card-color);
            background-image: radial-gradient(circle at top left, rgba(255,255,255,0.05), transparent);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        .card-chip {
            width: 45px;
            height: 32px;
            background: linear-gradient(135deg, #d4af37, #b8860b);
            border-radius: 5px;
        }

        .card-number { font-size: 18px; letter-spacing: 3px; color: #fff; font-family: monospace; z-index: 2; }
        
        .card-bottom { display: flex; justify-content: space-between; align-items: flex-end; z-index: 2; }
        .card-name-txt { font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: #fff; }

        /* TASTI AZIONE */
        .actions { display: flex; gap: 50px; margin-top: 50px; }
        .btn-container { text-align: center; cursor: pointer; color: inherit; }
        
        .btn-disabled { opacity: 0.3; cursor: default; }

        .circle-icon {
            width: 62px;
            height: 62px;
            border-radius: 50%;
            background: #080808;
            border: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-bottom: 10px;
            transition: 0.2s;
        }

        .accent-color { color: var(--accent); border-color: rgba(0, 242, 255, 0.2); }
        .btn-container:active:not(.btn-disabled) .circle-icon { transform: scale(0.9); background: #111; }

        /* BOTTOM NAV */
        .nav-bar {
            margin-top: auto;
            background: #000;
            display: flex;
            justify-content: space-around;
            padding: 15px 0 35px;
            border-top: 1px solid #111;
        }
        .nav-link { color: #333; text-decoration: none; font-size: 22px; }
        .active-link { color: var(--accent); }

    </style>
</head>
<body>

    <div class="brand-header">
        <img src="logotps.png" alt="Logo" class="custom-logo">
    </div>

    <div class="balance-section">
        <p class="label">Total Balance</p>
        <h1 class="balance">€ 0,00</h1>
    </div>

    <main class="main">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div class="card-chip"></div>
                <i class="fa-solid fa-wifi" style="transform: rotate(90deg); color: rgba(255,255,255,0.2);"></i>
            </div>

            <div class="card-number">•••• •••• •••• 10035</div>

            <div class="card-bottom">
                <p class="card-name-txt">LEONARDO SORU</p>
                <p style="font-size: 11px; font-weight: bold; color: white;">06/50</p>
            </div>
        </div>

        <div class="actions">
            <div class="btn-container" onclick="location.reload()">
                <div class="circle-icon accent-color"><i class="fa-solid fa-arrows-rotate"></i></div>
                <p class="label" style="font-size: 11px;">Boost</p>
            </div>

            <div class="btn-container btn-disabled">
                <div class="circle-icon"><i class="fa-solid fa-paper-plane"></i></div>
                <p class="label" style="font-size: 11px;">Send</p>
            </div>
        </div>
    </main>

    <nav class="nav-bar">
        <a href="#" class="nav-link active-link"><i class="fa-solid fa-house"></i></a>
        <a href="#" class="nav-link"><i class="fa-solid fa-chart-simple"></i></a>
        <a href="#" class="nav-link"><i class="fa-solid fa-user"></i></a>
    </nav>

</body>
</html>
